<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Systembolaget Kalkylator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,300..500&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --page-bg:    #120700;
      --card-bg:    #F6E9C4;
      --card-mid:   #EDD99A;
      --card-dark:  #E4C878;
      --ink:        #1A0800;
      --gold:       #9A6200;
      --gold-bright:#C4820E;
      --amber:      #B85000;
      --rust:       #7A2800;
    }

    html, body { height: 100%; }

    body {
      background: var(--page-bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 60px;
      position: relative;
      overflow-x: hidden;
      font-family: 'Fraunces', serif;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 40%,
        rgba(180, 90, 0, 0.16) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Rising bubbles ── */
    #bubbles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%,
        rgba(220, 140, 20, 0.5), rgba(160, 70, 0, 0.07));
      border: 1px solid rgba(210, 140, 20, 0.25);
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(0) translateX(0);    opacity: 0; }
      6%   { opacity: 0.85; }
      94%  { opacity: 0.18; }
      100% { transform: translateY(-108vh) translateX(12px); opacity: 0; }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      width: min(560px, 100%);
      background: var(--card-bg);
      padding: 40px 36px 32px;
      border-radius: 6px;
      box-shadow:
        0 0 0 2px var(--gold),
        0 0 0 9px var(--card-mid),
        0 0 0 11px var(--gold),
        0 0 0 14px var(--card-dark),
        0 0 0 16px var(--gold),
        0 24px 80px rgba(0,0,0,0.65),
        0 0 60px rgba(180, 100, 0, 0.2);
      animation: cardIn 0.55s cubic-bezier(0.34, 1.45, 0.64, 1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.93) translateY(18px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }
    .card::after {
      content: '';
      position: absolute;
      inset: 26px;
      border: 1px solid rgba(154, 98, 0, 0.2);
      border-radius: 3px;
      pointer-events: none;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 4px; }
    .pre-title {
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
      margin-bottom: 8px;
    }
    h1 {
      font-weight: 900;
      font-size: clamp(1.9rem, 6vw, 2.8rem);
      color: var(--ink);
      line-height: 1.05;
      letter-spacing: -0.015em;
    }
    h1 em { font-style: italic; font-weight: 400; color: var(--gold-bright); }
    .tagline {
      font-style: italic;
      font-weight: 300;
      font-size: 0.92rem;
      color: var(--gold);
      margin-top: 5px;
      opacity: 0.82;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 18px;
      color: var(--gold);
    }
    .divider-line { flex: 1; height: 1px; background: currentColor; opacity: 0.28; }
    .divider-pip { font-size: 0.62rem; letter-spacing: 0.15em; opacity: 0.5; }

    /* ── Input ── */
    .field-label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .input-shell {
      display: flex;
      border: 2px solid var(--gold);
      border-radius: 3px;
      overflow: hidden;
      transition: box-shadow 0.2s;
      background: #fff;
    }
    .input-shell:focus-within {
      box-shadow: 0 0 0 3px rgba(154, 98, 0, 0.16);
    }
    .kr-badge {
      font-family: 'Courier Prime', monospace;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--gold);
      background: var(--card-dark);
      padding: 10px 14px;
      border-right: 2px solid var(--gold);
      display: flex;
      align-items: center;
      user-select: none;
    }
    input[type="number"] {
      flex: 1;
      min-width: 0;
      border: none;
      outline: none;
      font-family: 'Courier Prime', monospace;
      font-weight: 700;
      font-size: 1.9rem;
      color: var(--ink);
      padding: 7px 13px;
      background: transparent;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"] { -moz-appearance: textfield; }
    input::placeholder { color: rgba(26,8,0,0.2); }

    /* ── Results list ── */
    .results {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease;
    }
    .results.open { max-height: 1000px; opacity: 1; }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin: 22px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(154,98,0,0.22);
    }
    .results-header-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.65;
    }

    /* ── Beverage rows ── */
    .bev-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .bev-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card-mid);
      border: 1px solid rgba(154,98,0,0.18);
      border-radius: 3px;
      padding: 10px 14px;
      transition: background 0.15s, border-color 0.15s;
      animation: rowIn 0.35s cubic-bezier(0.34, 1.3, 0.64, 1) both;
    }
    .bev-row.rank-1 {
      background: var(--card-dark);
      border-color: rgba(154,98,0,0.38);
    }
    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .bev-emoji {
      font-size: 1.55rem;
      line-height: 1;
      flex-shrink: 0;
      width: 32px;
      text-align: center;
    }

    .bev-info {
      flex: 1;
      min-width: 0;
    }
    .bev-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bev-meta {
      font-style: italic;
      font-weight: 300;
      font-size: 0.75rem;
      color: var(--gold);
      opacity: 0.8;
    }

    .bev-right {
      text-align: right;
      flex-shrink: 0;
    }
    .bev-count {
      font-family: 'Courier Prime', monospace;
      font-weight: 700;
      font-size: 1.7rem;
      color: var(--amber);
      line-height: 1;
    }
    .bev-row.rank-1 .bev-count {
      font-size: 2rem;
      color: var(--rust);
    }
    .bev-change {
      font-family: 'Courier Prime', monospace;
      font-size: 0.72rem;
      color: var(--gold);
      opacity: 0.7;
    }

    .rank-badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--rust);
      opacity: 0;
      margin-left: auto;
      padding-right: 2px;
      align-self: flex-start;
      margin-top: 2px;
    }
    .bev-row.rank-1 .rank-badge { opacity: 0.7; }

    /* ── Footer ── */
    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-style: italic;
      font-weight: 300;
      font-size: 0.72rem;
      color: var(--gold);
      opacity: 0.45;
    }
  </style>
</head>
<body>

  <div id="bubbles"></div>

  <main class="card">

    <header class="header">
      <p class="pre-title">Systembolaget &middot; Kalkylator</p>
      <h1>Vad får du<br>för <em>pengarna?</em></h1>
      <p class="tagline">Ange ett belopp och se hur långt det räcker</p>
    </header>

    <div class="divider" aria-hidden="true">
      <div class="divider-line"></div>
      <span class="divider-pip">&#10022; &#10022; &#10022;</span>
      <div class="divider-line"></div>
    </div>

    <label class="field-label" for="amount">Belopp i kronor</label>
    <div class="input-shell">
      <span class="kr-badge" aria-hidden="true">kr</span>
      <input
        type="number"
        id="amount"
        placeholder="0"
        min="0"
        step="any"
        autofocus
        aria-label="Belopp i svenska kronor"
      >
    </div>

    <div class="results" id="results" aria-live="polite" aria-atomic="true">
      <div class="results-header">
        <span class="results-header-label">Dryck</span>
        <span class="results-header-label">Antal &nbsp;/&nbsp; Växel</span>
      </div>
      <div class="bev-list" id="bevList"></div>
    </div>

    <p class="footer-note">Priser från systembolaget.se &middot; exkl. pant</p>

  </main>

  <script>
    // ─── Beverages ────────────────────────────────────────────────────────────
    // Update prices here when Systembolaget changes them.
    const BEVERAGES = [
      {
        id:    'brightbrew',
        name:  'Bright Brew',
        meta:  'Öl · 50 cl',
        emoji: '🍺',
        price: 15.90
      },
      {
        id:    'norrlands',
        name:  'Norrlands Guld Export',
        meta:  'Öl · 33 cl',
        emoji: '🍺',
        price: 12.90
      },
      {
        id:    'mariestads',
        name:  'Mariestads Export',
        meta:  'Öl · 33 cl',
        emoji: '🍺',
        price: 14.50
      },
      {
        id:    'rekorderlig',
        name:  'Rekorderlig Jordgubb Lime',
        meta:  'Cider · 33 cl',
        emoji: '🍹',
        price: 14.90
      },
      {
        id:    'absolut',
        name:  'Absolut Vodka',
        meta:  'Sprit · 700 ml',
        emoji: '🥃',
        price: 252.00
      }
    ];
    // ─────────────────────────────────────────────────────────────────────────

    // Generate ambient bubbles
    const bubblesEl = document.getElementById('bubbles');
    for (let i = 0; i < 28; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const sz = 3 + Math.random() * 18;
      b.style.width             = sz + 'px';
      b.style.height            = sz + 'px';
      b.style.left              = (1 + Math.random() * 98) + '%';
      b.style.bottom            = '-' + (sz + 2) + 'px';
      b.style.animationDuration = (7 + Math.random() * 13) + 's';
      b.style.animationDelay    = '-' + (Math.random() * 18) + 's';
      bubblesEl.appendChild(b);
    }

    // DOM
    const amountInput = document.getElementById('amount');
    const resultsEl   = document.getElementById('results');
    const bevList     = document.getElementById('bevList');

    // Animated count for a single element
    function animCount(el, from, to) {
      const t0  = performance.now();
      const dur = Math.min(500, Math.abs(to - from) * 10 + 80);
      (function frame(now) {
        const p    = Math.min((now - t0) / dur, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(from + (to - from) * ease);
        if (p < 1) requestAnimationFrame(frame);
        else el.textContent = to;
      })(performance.now());
    }

    function sek(val) {
      return val.toLocaleString('sv-SE', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }) + '\u00a0kr';
    }

    // Track previous counts per beverage for animation
    const prevCounts = {};

    function calculate() {
      const raw    = parseFloat(amountInput.value);
      const amount = (isNaN(raw) || raw < 0) ? 0 : raw;

      if (amount === 0) {
        resultsEl.classList.remove('open');
        return;
      }

      // Compute results and sort by count descending
      const computed = BEVERAGES.map(bev => {
        const count    = Math.floor(amount / bev.price);
        const cost     = Math.round(count * bev.price * 100) / 100;
        const leftover = Math.round((amount - cost) * 100) / 100;
        return { bev, count, leftover };
      }).sort((a, b) => b.count - a.count);

      resultsEl.classList.add('open');

      // Rebuild rows (preserving animation)
      bevList.replaceChildren();

      computed.forEach((item, idx) => {
        const row = document.createElement('div');
        row.className = 'bev-row' + (idx === 0 ? ' rank-1' : '');
        row.style.animationDelay = (idx * 40) + 'ms';

        // Emoji
        const emojiEl = document.createElement('div');
        emojiEl.className = 'bev-emoji';
        emojiEl.textContent = item.bev.emoji;
        row.appendChild(emojiEl);

        // Info
        const infoEl = document.createElement('div');
        infoEl.className = 'bev-info';

        const nameEl = document.createElement('div');
        nameEl.className = 'bev-name';
        nameEl.textContent = item.bev.name;
        infoEl.appendChild(nameEl);

        const metaEl = document.createElement('div');
        metaEl.className = 'bev-meta';
        metaEl.textContent = item.bev.meta + ' · ' + item.bev.price.toLocaleString('sv-SE', { minimumFractionDigits: 2 }) + ' kr/st';
        infoEl.appendChild(metaEl);

        row.appendChild(infoEl);

        // Rank badge (only visible for rank-1 via CSS)
        const badgeEl = document.createElement('div');
        badgeEl.className = 'rank-badge';
        badgeEl.textContent = 'Mest';
        row.appendChild(badgeEl);

        // Count + change
        const rightEl = document.createElement('div');
        rightEl.className = 'bev-right';

        const countEl = document.createElement('div');
        countEl.className = 'bev-count';
        countEl.textContent = prevCounts[item.bev.id] || 0;
        rightEl.appendChild(countEl);

        const changeEl = document.createElement('div');
        changeEl.className = 'bev-change';
        changeEl.textContent = '+' + sek(item.leftover);
        rightEl.appendChild(changeEl);

        row.appendChild(rightEl);
        bevList.appendChild(row);

        // Animate the count
        const prev = prevCounts[item.bev.id] || 0;
        animCount(countEl, prev, item.count);
        prevCounts[item.bev.id] = item.count;
      });
    }

    amountInput.addEventListener('input', calculate);
  </script>
</body>
</html>
